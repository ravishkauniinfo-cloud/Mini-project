<div class="calc-wrapper" style="max-width: 800px;">
            <div class="calc-header">
                <h2 class="hero-title animated-gradient-text" style="font-size: 3.5rem;">✨ AI Solver</h2>
                <p>Powered by Gemini. Paste any math problem, and we'll break it down for you.</p>
            </div>
            <div class="glass" style="padding: 2.5rem; border-radius: 24px;">
                <div class="math-input-group">
                    <label>Your Math Problem:</label>
                    <textarea id="ai-word-input" rows="5" placeholder="e.g., A train leaves Station A traveling at 60 mph..." style="margin-bottom: 1rem;"></textarea>
                </div>
                <button class="ai-btn" id="btn-solve-word" onclick="solveWordProblem()">Solve with Gemini ✨</button>
                <div id="ai-word-result" class="ai-response-box glass"></div>
            </div>
</div>
