<div class="calc-wrapper" style="max-width: 1200px; width: 100%;">
            <div class="calc-header">
                <h2 class="hero-title animated-gradient-text" style="font-size: 3.5rem;">Graphing</h2>
                <p>Plot multiple mathematical functions interactively natively on Plotly canvas.</p>
            </div>
            
            <div class="graphing-layout glass">
                <div class="graphing-sidebar">
                    <div style="padding: 20px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center;">
                        <h3 style="margin: 0; font-size: 1.2rem;">Expressions</h3>
                        <button class="btn btn-primary" style="padding: 0.4rem 0.8rem; font-size: 0.85rem;" onclick="graphApp.addEquation()">+ Add</button>
                    </div>
                    <div id="equation-list" class="graph-eq-list">
                        <!-- dynamic equations load here -->
                    </div>
                    <div style="padding: 15px; border-top: 1px solid var(--glass-border);">
                        <button class="btn ai-btn" style="width: 100%; margin-top: 0; padding: 0.8rem;" onclick="graphApp.analyzeGraph()">✨ Analyze Graph with AI</button>
                        <div id="ai-graph-analysis" class="ai-response-box glass" style="margin-top: 10px; font-size: 0.9rem;"></div>
                    </div>
                </div>
                <div class="graphing-canvas-area" id="plotly-graph"></div>
            </div>
    </div>
