<div class="calc-wrapper" style="max-width: 800px;">
            <div class="calc-header">
                <h2 class="hero-title animated-gradient-text" style="font-size: 3.5rem;">Matrix</h2>
                <p>Define matrices and evaluate expressions natively.</p>
            </div>
            
            <div class="matrix-ui-container">
                <div class="matrix-display-area" id="matrix-display-area"></div>
                <div class="matrix-toolbar">
                    <button class="btn" style="background: var(--gradient); color: white; border-radius: 6px; padding: 0.6rem 1.2rem;" onclick="matrixApp.newMatrix()">New Matrix</button>
                    <div style="display: flex; gap: 20px; align-items: center; color: var(--text-muted); font-size: 1.2rem;">
                        <button class="btn" style="background: var(--gradient); color: white; border-radius: 6px; padding: 0.4rem 0.8rem; font-size: 0.9rem;" onclick="matrixApp.analyzeMatrix()">✨ Explain</button>
                        <i class="fa-solid fa-rotate-left" style="cursor: pointer;" title="Undo"></i>
                        <span style="cursor: pointer; font-size: 1rem; font-weight: 500;" onclick="matrixApp.clearAll()">clear all</span>
                    </div>
                </div>
                <div id="ai-matrix-analysis" class="ai-response-box" style="margin: 15px; font-size: 0.95rem; border: 1px solid var(--matrix-border);"></div>
                <div class="matrix-panels">
                    <div id="matrix-left-panel" style="flex: 1; display: flex;"></div>
                    <div class="matrix-keypad right">
                        <!-- Row 1 -->
                        <button class="mk-btn mk-grey" onclick="matrixApp.type('7')">7</button>
                        <button class="mk-btn mk-grey" onclick="matrixApp.type('8')">8</button>
                        <button class="mk-btn mk-grey" onclick="matrixApp.type('9')">9</button>
                        <button class="mk-btn mk-white" onclick="matrixApp.type('/')">÷</button>
                        <button class="mk-btn mk-white" onclick="matrixApp.type('(')">(</button>
                        <button class="mk-btn mk-white" onclick="matrixApp.type(')')">)</button>

                        <!-- Row 2 -->
                        <button class="mk-btn mk-grey" onclick="matrixApp.type('4')">4</button>
                        <button class="mk-btn mk-grey" onclick="matrixApp.type('5')">5</button>
                        <button class="mk-btn mk-grey" onclick="matrixApp.type('6')">6</button>
                        <button class="mk-btn mk-white" onclick="matrixApp.type('*')">×</button>
                        <button class="mk-btn mk-grey" onclick="matrixApp.moveCursor('left')">←</button>
                        <button class="mk-btn mk-grey" onclick="matrixApp.moveCursor('right')">→</button>

                        <!-- Row 3 -->
                        <button class="mk-btn mk-grey" onclick="matrixApp.type('1')">1</button>
                        <button class="mk-btn mk-grey" onclick="matrixApp.type('2')">2</button>
                        <button class="mk-btn mk-grey" onclick="matrixApp.type('3')">3</button>
                        <button class="mk-btn mk-white" onclick="matrixApp.type('+')">+</button>
                        <button class="mk-btn mk-dark-grey" style="grid-column: span 2;" onclick="matrixApp.backspace()"><i class="fa-solid fa-delete-left"></i></button>

                        <!-- Row 4 -->
                        <button class="mk-btn mk-grey" onclick="matrixApp.type('0')">0</button>
                        <button class="mk-btn mk-grey" onclick="matrixApp.type('.')">.</button>
                        <button class="mk-btn mk-grey" onclick="matrixApp.type('sqrt(')">√</button>
                        <button class="mk-btn mk-white" onclick="matrixApp.type('-')">−</button>
                        <button class="mk-btn mk-enter" style="grid-column: span 2;" onclick="matrixApp.enter()"><i class="fa-solid fa-arrow-turn-down fa-rotate-90"></i></button>
                    </div>
                </div>
            </div>
        </div>
